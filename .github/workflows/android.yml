name: Android APK Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Replace google-services.json with your own Firebase project credentials.
      # Store the full JSON content in the GOOGLE_SERVICES_JSON repository secret.
      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      # Sign the APK with your keystore.
      # Required secrets:
      #   SIGNING_KEY_BASE64   -> base64 -w 0 your-keystore.jks
      #   KEY_ALIAS            -> alias used when creating the keystore
      #   KEY_STORE_PASSWORD   -> keystore password
      #   KEY_PASSWORD         -> key password
      #
      # To create a keystore (run once locally):
      #   keytool -genkey -v -keystore httpsms.jks -alias httpsms -keyalg RSA -keysize 2048 -validity 10000
      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_apk
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: httpsms-release.apk
          path: ${{ steps.sign_apk.outputs.signedReleaseFile }}
          retention-days: 30

      # Creates a GitHub Release with the APK attached when a tag like v1.0.0 is pushed.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.sign_apk.outputs.signedReleaseFile }}
          generate_release_notes: true
